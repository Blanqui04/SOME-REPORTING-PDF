# Default values for grafana-reporter
replicaCount: 1

image:
  repository: grafana-reporter
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: reporter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

postgresql:
  enabled: true
  auth:
    username: grafana_reporter
    password: changeme
    database: grafana_reporter
  primary:
    persistence:
      size: 5Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

celery:
  worker:
    replicaCount: 1
    concurrency: 2
  beat:
    enabled: true

env:
  GRAFANA_URL: "http://grafana:3000"
  GRAFANA_API_KEY: ""
  JWT_SECRET_KEY: "change-me-in-production"
  POSTGRES_PASSWORD: "changeme"
  LOG_LEVEL: "INFO"
  PROMETHEUS_ENABLED: "true"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
